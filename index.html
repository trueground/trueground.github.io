<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trueground</title>
    <style>
        :root {
            --bg: #0c0c0e;
            --text: #e8e8ee;
            --text-secondary: #8a8a96;
            --accent: #6b7fff;
            --border: #242428;
            --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
            --font-mono: "SF Mono", "Fira Code", monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 480px;
            padding: 0 24px;
            text-align: center;
        }

        .wordmark {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 32px;
        }

        .description {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 48px;
        }

        .description strong {
            color: var(--text);
            font-weight: 500;
        }

        .status {
            font-size: 12px;
            font-family: var(--font-mono);
            color: #55555f;
            padding: 10px 0;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="wordmark">Trueground</div>
    <p class="description">
        <strong>AI-native research, published weekly.</strong><br>
        Findings that challenge what the field currently believes.
        Practitioner discoveries that never made the changelog.
        The world through the lens of what AI is actually changing.
    </p>
    <div class="status">First issue coming soon — pipeline initializing</div>
</div>
</body>
</html>
